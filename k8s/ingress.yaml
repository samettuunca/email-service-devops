apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: email-service
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: email-service.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: email-service
            port:
              number: 8080